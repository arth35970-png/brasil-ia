<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Brasil IA Arthur</title>

<!-- FFmpeg corrigido -->
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.2/dist/ffmpeg.min.js"></script>

<style>
body {
    font-family: Segoe UI;
    background: linear-gradient(135deg, #6a0dad, #b266ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 380px;
    text-align: center;
}

.step { display: none; }
.step.active { display: block; }

button {
    width: 100%;
    padding: 10px;
    background: #6a0dad;
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
}

.progress {
    height: 10px;
    background: #ddd;
    margin-top: 10px;
    border-radius: 10px;
}

.bar {
    height: 100%;
    width: 0%;
    background: #6a0dad;
}

video, audio {
    width: 100%;
    margin-top: 10px;
    display: none;
}

.history {
    margin-top: 15px;
    font-size: 13px;
    text-align: left;
}
</style>
</head>

<body>

<div class="card">

<h3>🇧🇷 Brasil IA Arthur</h3>

<!-- ETAPA 1 -->
<div class="step active" id="step1">
    <p>1️⃣ Envie o vídeo</p>
    <input type="file" id="file">
    <video id="video" controls></video>

    <!-- 🔥 BOTÃO CONVERTER -->
    <button onclick="start()">Converter</button>
</div>

<!-- ETAPA 2 -->
<div class="step" id="step2">
    <p>2️⃣ Convertendo...</p>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <p id="status"></p>
    <p id="tempo"></p>
</div>

<!-- ETAPA 3 -->
<div class="step" id="step3">
    <p>3️⃣ Pronto!</p>
    <audio id="audio" controls></audio>
    <button id="download">Baixar</button>

    <div class="history" id="history"></div>
</div>

</div>

<script>
const ffmpeg = FFmpeg.createFFmpeg({
    log: true,
    corePath: "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.2/dist/ffmpeg-core.js"
});

let file, inicio;

// upload
document.getElementById("file").onchange = e => {
    file = e.target.files[0];

    const video = document.getElementById("video");
    video.src = URL.createObjectURL(file);
    video.style.display = "block";
};

// trocar etapa
function step(id) {
    document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// iniciar conversão
async function start() {
    if (!file) return alert("Escolha um vídeo!");

    step("step2");
    inicio = Date.now();

    document.getElementById("status").innerText = "Carregando FFmpeg...";

    if (!ffmpeg.isLoaded()) {
        await ffmpeg.load();
    }

    document.getElementById("status").innerText = "Convertendo...";

    ffmpeg.FS("writeFile", "input.mp4", await FFmpeg.fetchFile(file));

    ffmpeg.setProgress(({ ratio }) => {
        let percent = Math.round(ratio * 100);

        document.getElementById("bar").style.width = percent + "%";
        document.getElementById("status").innerText = percent + "%";

        let tempo = (Date.now() - inicio) / 1000;

        if (percent > 5) {
            let total = tempo / (percent / 100);
            let restante = Math.round(total - tempo);
            document.getElementById("tempo").innerText =
                "Tempo restante: " + restante + "s";
        }
    });

    await ffmpeg.run(
        "-i", "input.mp4",
        "-vn",
        "-acodec", "libmp3lame",
        "output.mp3"
    );

    const data = ffmpeg.FS("readFile", "output.mp3");

    const url = URL.createObjectURL(
        new Blob([data.buffer], { type: "audio/mp3" })
    );

    step("step3");

    const audio = document.getElementById("audio");
    audio.src = url;
    audio.style.display = "block";
    audio.play();

    document.getElementById("download").onclick = () => {
        const a = document.createElement("a");
        a.href = url;
        a.download = "audio.mp3";
        a.click();
    };

    salvarHistorico(file.name, url);
    carregarHistorico();
}

// histórico
function salvarHistorico(nome, url) {
    let h = JSON.parse(localStorage.getItem("hist") || "[]");
    h.unshift({nome, url});
    localStorage.setItem("hist", JSON.stringify(h.slice(0,5)));
}

function carregarHistorico() {
    let h = JSON.parse(localStorage.getItem("hist") || "[]");
    document.getElementById("history").innerHTML =
        "<b>Histórico:</b><br>" +
        h.map(i => `<a href="${i.url}" target="_blank">${i.nome}</a>`).join("<br>");
}

carregarHistorico();
</script>

</body>
</html>
