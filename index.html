<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brasil IA Arthur</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #6a0dad, #b266ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 400px;
    text-align: center;
}

.step { display: none; }
.step.active { display: block; }

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #6a0dad;
    color: white;
}

.progress {
    height: 10px;
    background: #ddd;
    border-radius: 10px;
    margin-top: 15px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #6a0dad;
}

video, audio {
    width: 100%;
    margin-top: 10px;
    display: none;
}
</style>
</head>

<body>

<div class="card">

<h2>🇧🇷 Brasil IA Arthur</h2>

<!-- ETAPA 1 -->
<div class="step active" id="step1">
    <p>1️⃣ Envie seu vídeo</p>
    <input type="file" id="fileInput">
    <video id="videoPreview" controls></video>
    <button onclick="goToStep2()">Continuar</button>
</div>

<!-- ETAPA 2 -->
<div class="step" id="step2">
    <p>2️⃣ Convertendo / baixando...</p>
    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <p id="status"></p>
</div>

<!-- ETAPA 3 -->
<div class="step" id="step3">
    <p>3️⃣ Pronto!</p>
    <audio id="audioPlayer" controls></audio>
    <button id="downloadBtn">Baixar MP3</button>
</div>

</div>

<script>
let selectedFile, fileBase64, conversionId;

const fileInput = document.getElementById("fileInput");
const video = document.getElementById("videoPreview");
const audio = document.getElementById("audioPlayer");
const progressBar = document.getElementById("progressBar");
const statusText = document.getElementById("status");

fileInput.onchange = () => {
    selectedFile = fileInput.files[0];

    video.src = URL.createObjectURL(selectedFile);
    video.style.display = "block";

    const reader = new FileReader();
    reader.onload = () => {
        fileBase64 = reader.result.split(",")[1];
    };
    reader.readAsDataURL(selectedFile);
};

function showStep(id) {
    document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function goToStep2() {
    if (!fileBase64) return alert("Selecione um vídeo!");

    showStep("step2");

    fetch("/.netlify/functions/convert", {
        method: "POST",
        body: JSON.stringify({
            input: "base64",
            file: fileBase64,
            filename: selectedFile.name,
            outputformat: "mp3"
        })
    })
    .then(res => res.json())
    .then(data => {
        conversionId = data.data.id;
        checkStatus();
    });
}

function checkStatus() {
    const interval = setInterval(() => {
        fetch(`https://api.convertio.co/convert/${conversionId}/status`)
        .then(res => res.json())
        .then(data => {

            let percent = data.data.percent || 0;
            progressBar.style.width = percent + "%";
            statusText.innerText = percent + "%";

            if (data.data.step === "finish") {
                clearInterval(interval);

                let url = data.data.output.url;

                showStep("step3");

                audio.src = url;
                audio.style.display = "block";
                audio.play();

                document.getElementById("downloadBtn").onclick = () => {
                    window.open(url);
                };
            }

        });
    }, 2000);
}
</script>

</body>
</html>
