<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Brasil IA Arthur</title>
<style>
body {
    font-family: Segoe UI;
    background: linear-gradient(135deg, #6a0dad, #b266ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 380px;
    text-align: center;
}
.step { display: none; }
.step.active { display: block; }
button {
    width: 100%;
    padding: 10px;
    background: #6a0dad;
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
}
.progress {
    height: 10px;
    background: #ddd;
    margin-top: 10px;
}
.bar {
    height: 100%;
    width: 0%;
    background: #6a0dad;
}
video, audio {
    width: 100%;
    margin-top: 10px;
    display: none;
}
</style>
</head>
<body>
<div class="card">
<h3>🇧🇷 Brasil IA Arthur</h3>

<!-- ETAPA 1 -->
<div class="step active" id="step1">
    <input type="file" id="file">
    <video id="video" controls></video>
    <button onclick="enviar()">Converter</button>
</div>

<!-- ETAPA 2 -->
<div class="step" id="step2">
    <p>Convertendo...</p>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <p id="status"></p>
</div>

<!-- ETAPA 3 -->
<div class="step" id="step3">
    <audio id="audio" controls></audio>
    <button id="download">Baixar</button>
</div>
</div>

<script>
let file = null;

document.getElementById("file").onchange = (e) => {
    file = e.target.files[0];
    const video = document.getElementById("video");
    video.src = URL.createObjectURL(file);
    video.style.display = "block";
};

function step(id) {
    document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

async function enviar() {
    if (!file) return alert("Escolha um vídeo!");
    step("step2");

    const status = document.getElementById("status");
    const bar = document.getElementById("bar");
    status.innerText = "Enviando...";

    const reader = new FileReader();
    reader.onload = async () => {
        try {
            const base64 = reader.result.split(",")[1];
            const res = await fetch("/api/convert", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ file: base64, filename: file.name })
            });
            const data = await res.json();
            if (!data.id) {
                alert("Erro na conversão!");
                return;
            }
            acompanhar(data.id);
        } catch (err) {
            console.error(err);
            alert("Erro ao enviar!");
        }
    };
    reader.readAsDataURL(file);
}

function acompanhar(id) {
    const status = document.getElementById("status");
    const bar = document.getElementById("bar");
    let fake = 0;

    const fakeProgress = setInterval(() => {
        if (fake < 90) {
            fake += 5;
            bar.style.width = fake + "%";
        }
    }, 500);

    const intervalo = setInterval(async () => {
        try {
            const res = await fetch("/api/status?id=" + id);
            const data = await res.json();
            if (!data.data) return;
            status.innerText = data.data.step;
            if (data.data.step === "finish") {
                clearInterval(intervalo);
                clearInterval(fakeProgress);
                bar.style.width = "100%";
                const url = data.data.output.url;
                step("step3");
                const audio = document.getElementById("audio");
                audio.src = url;
                audio.style.display = "block";
                audio.play();
                document.getElementById("download").onclick = () => window.open(url);
            }
        } catch (err) {
            console.error(err);
        }
    }, 3000);
}
</script>
</body>
</html>
