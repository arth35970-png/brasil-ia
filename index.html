<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Brasil IA Arthur</title>

<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>

<style>
body {
    font-family: Segoe UI;
    background: linear-gradient(135deg, #6a0dad, #b266ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 380px;
    text-align: center;
}

button {
    width: 100%;
    padding: 10px;
    background: #6a0dad;
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
}

.progress {
    height: 10px;
    background: #ddd;
    margin-top: 10px;
    border-radius: 10px;
}

.bar {
    height: 100%;
    width: 0%;
    background: #6a0dad;
}

video, audio {
    width: 100%;
    margin-top: 10px;
    display: none;
}
</style>
</head>

<body>

<div class="card">

<h3>🇧🇷 Brasil IA Arthur</h3>

<input type="file" id="file">
<video id="video" controls></video>

<button onclick="start()">Converter</button>

<div class="progress"><div class="bar" id="bar"></div></div>

<p id="status"></p>

<audio id="audio" controls></audio>
<button id="download" style="display:none;">Baixar</button>

</div>

<script>
let file;

const ffmpeg = FFmpeg.createFFmpeg({
    log: true,
    corePath: "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/ffmpeg-core.js"
});

// preview
document.getElementById("file").onchange = e => {
    file = e.target.files[0];
    const video = document.getElementById("video");
    video.src = URL.createObjectURL(file);
    video.style.display = "block";
};

async function start() {
    if (!file) return alert("Escolha um vídeo!");

    const status = document.getElementById("status");
    const bar = document.getElementById("bar");

    try {
        status.innerText = "🔄 Carregando motor (primeira vez demora)...";

        if (!ffmpeg.isLoaded()) {
            await ffmpeg.load();
        }

        status.innerText = "📂 Preparando arquivo...";

        ffmpeg.FS("writeFile", "input.mp4", await FFmpeg.fetchFile(file));

        ffmpeg.setProgress(({ ratio }) => {
            let percent = Math.round(ratio * 100);
            bar.style.width = percent + "%";
            status.innerText = percent + "% convertendo...";
        });

        status.innerText = "⚙️ Convertendo...";

        await ffmpeg.run(
            "-i", "input.mp4",
            "-vn",
            "-acodec", "libmp3lame",
            "output.mp3"
        );

        const data = ffmpeg.FS("readFile", "output.mp3");

        const url = URL.createObjectURL(
            new Blob([data.buffer], { type: "audio/mp3" })
        );

        status.innerText = "✅ Pronto!";

        const audio = document.getElementById("audio");
        audio.src = url;
        audio.style.display = "block";
        audio.play();

        const btn = document.getElementById("download");
        btn.style.display = "block";
        btn.onclick = () => {
            const a = document.createElement("a");
            a.href = url;
            a.download = "audio.mp3";
            a.click();
        };

    } catch (err) {
        console.error(err);
        status.innerText = "❌ Erro ao carregar FFmpeg!";
        alert("Erro: FFmpeg não carregou. Tente outro navegador (Chrome).");
    }
}
</script>

</body>
</html>
