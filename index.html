<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Brasil IA Arthur</title>

<style>
body {
    font-family: Segoe UI;
    background: #eee;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 350px;
    text-align: center;
}
button {
    width: 100%;
    padding: 10px;
    background: #6a0dad;
    color: white;
    border: none;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">

<h3>🇧🇷 Brasil IA Arthur</h3>

<input type="file" id="file">
<button onclick="enviar()">Converter</button>

<p id="status"></p>

<audio id="audio" controls></audio>
<button id="download" style="display:none;">Baixar</button>

</div>

<script>
let file = null;

document.getElementById("file").onchange = (e) => {
    file = e.target.files[0];
};

async function enviar() {
    if (!file) return alert("Escolha um vídeo!");

    const status = document.getElementById("status");
    status.innerText = "Enviando...";

    const reader = new FileReader();

    reader.onload = async () => {
        const base64 = reader.result.split(",")[1];

        const res = await fetch("/api/convert", {
            method: "POST",
            body: JSON.stringify({
                file: base64,
                filename: file.name
            })
        });

        const data = await res.json();

        acompanhar(data.id);
    };

    reader.readAsDataURL(file);
}

function acompanhar(id) {
    const intervalo = setInterval(async () => {

        const res = await fetch("https://api.convertio.co/convert/" + id + "/status");
        const data = await res.json();

        document.getElementById("status").innerText = data.data.step;

        if (data.data.step === "finish") {
            clearInterval(intervalo);

            const url = data.data.output.url;

            const audio = document.getElementById("audio");
            audio.src = url;

            const btn = document.getElementById("download");
            btn.style.display = "block";
            btn.onclick = () => window.open(url);
        }

    }, 3000);
}
</script>

</body>
</html>
