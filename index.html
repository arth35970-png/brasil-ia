<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Brasil IA Arthur</title>

<style>
body {
    font-family: Segoe UI;
    background: linear-gradient(135deg, #6a0dad, #b266ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 350px;
    text-align: center;
}

button {
    width: 100%;
    padding: 10px;
    background: #6a0dad;
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
}

.progress {
    height: 10px;
    background: #ddd;
    margin-top: 10px;
    border-radius: 10px;
}

.bar {
    height: 100%;
    width: 0%;
    background: #6a0dad;
}

video, audio {
    width: 100%;
    margin-top: 10px;
    display: none;
}
</style>
</head>

<body>

<div class="card">

<h3>🇧🇷 Brasil IA Arthur</h3>

<input type="file" id="file">
<video id="video" controls></video>

<button onclick="converter()">Converter</button>

<div class="progress">
    <div class="bar" id="bar"></div>
</div>

<p id="status"></p>
<p id="tempo"></p>

<audio id="audio" controls></audio>
<button id="baixar" style="display:none;">Baixar</button>

</div>

<script>
let file, id, inicio;

const video = document.getElementById("video");

document.getElementById("file").onchange = e => {
    file = e.target.files[0];
    video.src = URL.createObjectURL(file);
    video.style.display = "block";
};

async function converter() {
    if (!file) return alert("Escolha um vídeo");

    inicio = Date.now();

    document.getElementById("status").innerText = "Preparando...";

    // 🔥 GARANTE BASE64 CERTO
    const base64 = await toBase64(file);

    document.getElementById("status").innerText = "Enviando...";

    const res = await fetch("/.netlify/functions/convert", {
        method: "POST",
        body: JSON.stringify({
            input: "base64",
            file: base64,
            filename: file.name,
            outputformat: "mp3"
        })
    });

    const data = await res.json();

    if (!data.data) {
        alert("Erro na API!");
        console.log(data);
        return;
    }

    id = data.data.id;

    acompanhar();
}

// 🔥 FUNÇÃO QUE NÃO BUGA
function toBase64(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.readAsDataURL(file);
    });
}

function acompanhar() {
    const intervalo = setInterval(async () => {

        const res = await fetch(`https://api.convertio.co/convert/${id}/status`);
        const data = await res.json();

        const p = data.data.percent || 0;

        document.getElementById("bar").style.width = p + "%";

        let tempo = (Date.now() - inicio) / 1000;

        if (p > 5) {
            let total = tempo / (p / 100);
            let restante = Math.round(total - tempo);
            document.getElementById("tempo").innerText = "Tempo restante: " + restante + "s";
        }

        document.getElementById("status").innerText = p + "%";

        if (data.data.step === "finish") {
            clearInterval(intervalo);

            let url = data.data.output.url;

            document.getElementById("status").innerText = "Pronto!";

            const audio = document.getElementById("audio");
            audio.src = url;
            audio.style.display = "block";
            audio.play();

            const btn = document.getElementById("baixar");
            btn.style.display = "block";
            btn.onclick = () => window.open(url);
        }

    }, 2000);
}
</script>

</body>
</html>
